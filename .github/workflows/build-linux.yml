name: Build Linux AppImage

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -q
          pip install torch --index-url https://download.pytorch.org/whl/cpu -q

      - name: Run madrac-subs tests
        run: |
          PYTHONPATH=src/madrac_subs/src python -m pytest \
            src/madrac_subs/tests/ -v --tb=short -m "not real" \
            --junitxml=test-subs-results.xml
        continue-on-error: true

      - name: Run madrac-dubbing tests
        run: |
          PYTHONPATH=src/madrac_dubbing/src python -m pytest \
            src/madrac_dubbing/tests/ -v --tb=short \
            --junitxml=test-dubs-results.xml
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-*-results.xml

  build-appimage:
    runs-on: ubuntu-22.04
    needs: test
    if: |
      always() &&
      !contains(needs.*.result, 'cancelled') &&
      (github.event_name == 'push' || github.event_name == 'pull_request')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 ffmpeg

      - name: Cache pip + models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
          key: ${{ runner.os }}-appimage-${{ hashFiles('requirements-linux.txt') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu -q
          pip install -r requirements-linux.txt -q

      - name: Verify imports
        run: |
          python -c "import torch; print('torch OK')"
          python -c "import transformers; print('transformers OK')"
          python -c "import faster_whisper; print('faster_whisper OK')"
          python -c "import PySide6; print('PySide6 OK')"

      - name: Build AppImage
        run: bash build-linux.sh
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: MADRAC-SUBS-AppImage
          path: dist/*.AppImage
          compression-level: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: MADRAC-SUBS ${{ github.ref_name }}
          body: |
            ## MADRAC-SUBS ${{ github.ref_name }}

            AppImage generado automaticamente por GitHub Actions.

            ### Componentes incluidos
            - madrac-subs v3 (transcripcion, traduccion, edicion de subtitulos)
            - madrac-dubbing (doblaje por IA)
            - Dub Now (boton de doblaje integrado)

            ### Instalacion
            1. Descargar el archivo `.AppImage`
            2. Dar permisos de ejecucion: `chmod +x MADRAC-SUBS-*.AppImage`
            3. Ejecutar: `./MADRAC-SUBS-*.AppImage`
          files: dist/*.AppImage
          fail_on_unmatched_files: false
